<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa ❤️</title>

    <style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        font-family: Arial, sans-serif;
        overflow: hidden; 
    }
    #start {
        position: absolute;
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ff7eb3;
        color: pointer;
    }
    #content {
        display: none;
        text-align: center;
        margin-top: white;
    }

    h1 {
        font-size: 3em;
        animation: pulse 2s infinite;
    }

    h2 {
        font-size: 2em;
    }

    p {
        font-size: 1.2em;
        max-width: 300px;
        margin: auto;
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    .heart {
        position: absolute;
        color: white; 
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from {
            transform: translateY(100vh);
        }
        to {
            transform: translateY(-10vh);
        }
    }
    </style>
</head>
<body>

    <div id="start"> 

        <button onclick="startSuprise()" id="btn">
        💖 Clique aqui para sua surpresa 💖 
        </button>
    </div>
     
    <div id="contentd">
        <h1>🎉 Feliz Aniversário 🎉</h1>
        <h2> Ana Júlia 💖</h2>
        <p> 
            Hoje é um dia especial... mas você faz todos os meus dias serem especiais.
            Eu sou muito grato por ter você na minha vida.
            Te Amo ❤️
        </p>
    </div>

    <audio src="music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3"> 
    </audio>

    <script>
        function startSuprise() {
            document.getAnimations("start").style.display = "none";
            document.getElementById("content").style.display = "block";
            document.getElementById("music").play();

            setInterval(() => {
                let heart = document.createElement("div");
                heart.classList.add("heart");
                heart.innerHTML = "💖";

                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 3 + 2) + "s";''

                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 5000);
            }, 300);
        }

    </script>

</body>
</html>
